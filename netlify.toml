[build]
  publish = "public"

[functions]
  directory = "functions"
  node_bundler = "esbuild"

[functions."website-factory"]
  included_files = [
    "public/assets/demo-images/library/bouwbedrijf/**",
    "public/assets/demo-images/library/financieel-adviseur/**",
    "public/assets/demo-images/library/holistisch/**",
  ]

[functions."demo-journey"]
  included_files = [
    "public/assets/demo-images/library/bouwbedrijf/**",
    "public/assets/demo-images/library/financieel-adviseur/**",
    "public/assets/demo-images/library/holistisch/**",
  ]

[functions."admin-preview-image-assets"]
  included_files = [
    "public/assets/demo-images/library/*/hero.png",
    "public/assets/demo-images/library/holistisch/natuur-coaching.png",
    "public/assets/demo-images/library/quantumbouw/badkamer-natuursteen.jpg",
    "public/assets/demo-images/library/rijschool/scooterles-hero.png",
  ]

[[redirects]]
  from = "/account-activeren"
  to = "/account-activeren.html"
  status = 200

[[redirects]]
  from = "/admin-login"
  to = "/admin-login.html"
  status = 200

[[redirects]]
  from = "/klant-login"
  to = "/klant-login.html"
  status = 200

[[redirects]]
  from = "/admin-assets"
  to = "/admin-assets.html"
  status = 200

[[redirects]]
  from = "/admin-social-media-studio"
  to = "/admin-social-media-studio.html"
  status = 200

[[redirects]]
  from = "/admin-max-brain"
  to = "/admin-max-brain.html"
  status = 200

[[redirects]]
  from = "/admin-platform-health"
  to = "/admin-platform-health.html"
  status = 200

[[redirects]]
  from = "/admin-nieuwe-opdracht"
  to = "/admin-nieuwe-opdracht.html"
  status = 200

[[redirects]]
  from = "/api/customer-timeline/:customerId"
  to = "/.netlify/functions/customer-timeline/:customerId"
  status = 200

[[redirects]]
  from = "/api/global-search"
  to = "/.netlify/functions/global-search"
  status = 200

[[redirects]]
  from = "/api/max-brain/context"
  to = "/.netlify/functions/max-brain-context"
  status = 200

[[redirects]]
  from = "/api/platform-health"
  to = "/.netlify/functions/platform-health"
  status = 200

[[redirects]]
  from = "/api/customer-onboarding"
  to = "/.netlify/functions/customer-onboarding"
  status = 200

[[redirects]]
  from = "/api/:splat"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "https://preview.maxwebstudio.nl/:slug"
  to = "/.netlify/functions/public-preview-render?slug=:slug"
  status = 200
  force = true

[[redirects]]
  from = "/preview/:slug"
  to = "/.netlify/functions/public-preview-render?slug=:slug"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self), usb=(), bluetooth=(), browsing-topics=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://maps.googleapis.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://*.supabase.co https://api.mollie.com https://api.resend.com https://maps.googleapis.com; frame-src 'self' https://www.google.com https://www.youtube.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"

[[headers]]
  for = "/preview-embed.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Cache-Control = "no-store, max-age=0, must-revalidate"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co; frame-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'self'"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/admin-*.html"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/admin-dashboard.html"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/admin-sales.html"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/admin-assets.html"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/admin-social-media-studio.html"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/admin-lead-generator.html"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/account-activeren.html"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/src/*"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"

[[headers]]
  for = "/admin/ui/*"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"
