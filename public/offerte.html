<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Offerte | Max Webstudio</title>
    <meta name="description" content="Bekijk je persoonlijke offerte van Max Webstudio." />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Max Webstudio home">
        <svg class="brand-mark" viewBox="0 0 80 80" aria-hidden="true"><rect x="6" y="6" width="68" height="68" rx="18"></rect><path class="brand-m" d="M22 53V27h7.3L40 42.2 50.7 27H58v26h-8.1V39.1l-7.5 10.2h-4.8l-7.5-10.2V53H22Z"></path><path class="brand-spark" d="M58 25h9v9" fill="none" stroke-width="4" stroke-linecap="round"></path></svg>
        <span>Max Webstudio</span>
      </a>
      <nav class="main-nav" aria-label="Hoofdnavigatie">
        <a href="index.html#projecten">Demo's</a>
        <a href="index.html#prijzen">Pakketten</a>
        <a href="index.html#aanvraag">Contact</a>
      </nav>
      <a class="header-cta" href="index.html#aanvraag">Plan gratis gesprek</a>
    </header>

    <main>
      <section class="page-hero payment-hero">
        <p class="eyebrow">Persoonlijke offerte</p>
        <h1 id="quote-page-title">Offerte laden...</h1>
        <p id="quote-page-subtitle">Bekijk rustig wat inbegrepen is en geef akkoord wanneer alles klopt.</p>
      </section>

      <section class="content-page payment-page quote-page-shell" id="quote-page">
        <article class="checkout-summary-card quote-public-card" id="quote-card" aria-live="polite">
          <p class="section-kicker">Offerte</p>
          <h2>Offertegegevens</h2>
          <p>Offerte niet gevonden. Open de offerte opnieuw via de link die je van Max Webstudio hebt ontvangen.</p>
        </article>
      </section>
    </main>

    <script type="module">
      import {
        getCompanySettings,
        getMailtoLink,
        getTelephoneLink,
        getWhatsappLink,
      } from "./src/services/companySettingsService.js";

      (() => {
        const companySettings = getCompanySettings();
        const storageKey = "maxwebstudioQuotes";
        const params = new URLSearchParams(window.location.search);
        const quoteId = params.get("quoteId") || "";
        const supabaseQuoteId = params.get("supabaseQuoteId") || "";
        const title = document.getElementById("quote-page-title");
        const subtitle = document.getElementById("quote-page-subtitle");
        const card = document.getElementById("quote-card");
        const money = (value) => new Intl.NumberFormat("nl-NL", { style: "currency", currency: "EUR" }).format(Number(value || 0));
        const formatDate = (value) => {
          if (!value) return "-";
          const date = new Date(value);
          return Number.isNaN(date.getTime()) ? value : date.toLocaleDateString("nl-NL");
        };

        function readQuotes() {
          try {
            const stored = JSON.parse(localStorage.getItem(storageKey) || "[]");
            return Array.isArray(stored) ? stored : [];
          } catch (error) {
            return [];
          }
        }

        function writeQuotes(quotes) {
          localStorage.setItem(storageKey, JSON.stringify(quotes));
        }

        function logDemoEmail(quote) {
          if (!quote?.isDemoJourney || !quote.demoJourneyId) return;
          try {
            const key = "maxwebstudioDemoEmails";
            const emails = JSON.parse(localStorage.getItem(key) || "[]");
            const exists = Array.isArray(emails) && emails.some((email) => email.demoJourneyId === quote.demoJourneyId && email.type === "offerte_geaccepteerd");
            if (exists) return;
            const email = {
              id: `demo-email-offerte-geaccepteerd-${Date.now()}`,
              customerId: quote.profileId || quote.customerId || "",
              type: "offerte_geaccepteerd",
              subject: "Demo-offerte geaccepteerd",
              to: quote.customerEmail || "",
              body: `Offerte ${quote.quoteNumber || ""} is lokaal geaccepteerd.`,
              status: "demo/verzonden lokaal",
              createdAt: new Date().toISOString(),
              isDemoJourney: true,
              demoJourneyId: quote.demoJourneyId,
            };
            localStorage.setItem(key, JSON.stringify([email, ...(Array.isArray(emails) ? emails : [])]));
          } catch (error) {
            console.warn("Demo e-mail kon niet worden opgeslagen", error);
          }
        }

        function createRow(label, value) {
          const row = document.createElement("div");
          const dt = document.createElement("dt");
          const dd = document.createElement("dd");
          dt.textContent = label;
          dd.textContent = value || "-";
          row.append(dt, dd);
          return row;
        }

        function findQuote(quotes) {
          return quotes.find((item) => {
            const ids = [item.id, item.quoteId, item.supabaseQuoteId, item._supabaseQuoteId].filter(Boolean).map(String);
            return (quoteId && ids.includes(String(quoteId))) || (supabaseQuoteId && ids.includes(String(supabaseQuoteId)));
          });
        }

        function updateStoredQuote(quote, patch = {}) {
          const quotes = readQuotes();
          const next = quotes.map((item) => {
            const ids = [item.id, item.quoteId, item.supabaseQuoteId, item._supabaseQuoteId].filter(Boolean).map(String);
            const matches = ids.includes(String(quote.id || quote.quoteId || quoteId || supabaseQuoteId));
            return matches ? { ...item, ...patch, updatedAt: new Date().toISOString() } : item;
          });
          writeQuotes(next);
          return findQuote(next) || { ...quote, ...patch };
        }

        function markQuoteViewed(quote) {
          if (quote.acceptedAt || quote.status === "geaccepteerd") return quote;
          if (quote.viewedAt && quote.status !== "verzonden") return quote;
          const patch = {
            viewedAt: quote.viewedAt || new Date().toISOString(),
            status: quote.status === "verzonden" ? "bekeken" : quote.status,
          };
          return updateStoredQuote(quote, patch);
        }

        function createText(tag, className, text) {
          const element = document.createElement(tag);
          if (className) element.className = className;
          element.textContent = text;
          return element;
        }

        function createCompanyContactActions(subject = "Vraag over offerte") {
          const actions = document.createElement("div");
          actions.className = "portal-actions";
          const whatsapp = document.createElement("a");
          whatsapp.className = "button secondary";
          whatsapp.href = getWhatsappLink(companySettings);
          whatsapp.target = "_blank";
          whatsapp.rel = "noopener";
          whatsapp.textContent = "WhatsApp Max";
          const call = document.createElement("a");
          call.className = "button secondary";
          call.href = getTelephoneLink(companySettings);
          call.textContent = companySettings.phoneDisplay;
          const email = document.createElement("a");
          email.className = "button secondary";
          email.href = getMailtoLink(companySettings, subject);
          email.textContent = companySettings.primaryEmail;
          actions.append(whatsapp, call, email);
          return actions;
        }

        function renderQuote() {
          const quotes = readQuotes();
          let quote = findQuote(quotes);
          card.replaceChildren();
          if (!quote) {
            title.textContent = "Offerte niet gevonden";
            subtitle.textContent = "Controleer de link of neem contact op met Max Webstudio.";
            card.append(
              createText("p", "section-kicker", "Niet gevonden"),
              createText("h2", "", "Deze offerte kan niet worden geladen."),
              createText("p", "summary-note", "Open de offerte opnieuw via de link die je hebt ontvangen. Blijft dit gebeuren? Neem dan even contact op."),
              createCompanyContactActions("Offerte niet gevonden")
            );
            return;
          }
          quote = markQuoteViewed(quote);

          title.textContent = quote.title || "Jouw offerte van Max Webstudio";
          subtitle.textContent = `${quote.customerCompany || quote.customerName || "Klant"} - ${quote.quoteNumber || "Offerte"}`;

          const kicker = document.createElement("p");
          kicker.className = "section-kicker";
          kicker.textContent = quote.status === "geaccepteerd" ? "Akkoord ontvangen" : "Offerte klaar voor review";
          const heading = document.createElement("h2");
          heading.textContent = quote.quoteNumber || "Offerte";
          const proposal = document.createElement("p");
          proposal.textContent = quote.proposal || "Bedankt voor je aanvraag. Hieronder vind je het voorstel, de planning en wat Max Webstudio voor je verzorgt.";

          const meta = document.createElement("dl");
          meta.className = "summary-lines";
          meta.append(
            createRow("Klant", quote.customerCompany || quote.customerName || "-"),
            createRow("Website", quote.websiteDomain || quote.websiteName || "Wordt afgestemd"),
            createRow("Project", quote.projectName || quote.type || "-"),
            createRow("Offertedatum", formatDate(quote.quoteDate)),
            createRow("Geldig tot", formatDate(quote.validUntil)),
            createRow("Status", quote.status || "concept")
          );

          const lines = document.createElement("div");
          lines.className = "summary-lines";
          (quote.lines || []).forEach((line) => {
            const item = document.createElement("div");
            item.append(createRow(`${line.quantity || 1}x ${line.description || "Offertregel"}`, money(Number(line.quantity || 0) * Number(line.unitPrice || 0))));
            lines.append(item);
          });

          const total = document.createElement("div");
          total.className = "summary-total";
          total.innerHTML = `<span>Totaal incl. btw</span><strong>${money(quote.total)}</strong><small>Subtotaal ${money(quote.subtotal)} · BTW ${money(quote.vat)}</small>`;

          const included = document.createElement("ul");
          included.className = "summary-included quote-included-list";
          [
            "Website-opzet volgens afgesproken pakket",
            "Mobielvriendelijke oplevering",
            "Basiscontrole voor snelheid, veiligheid en vindbaarheid",
            "Klantportaal voor voortgang, berichten en wijzigingen",
          ].forEach((item) => included.append(createText("li", "", item)));

          const faq = document.createElement("div");
          faq.className = "quote-faq";
          [
            ["Wat gebeurt er na akkoord?", "Max Webstudio zet je project klaar, activeert je klantportaal en stemt de planning met je af."],
            ["Is dit al een betaling?", "Nee. Akkoord geven bevestigt de offerte. Betaling en facturatie volgen apart."],
            ["Kan ik nog iets wijzigen?", "Ja. Reageer eerst even voordat je akkoord geeft, dan passen we de offerte aan."],
          ].forEach(([question, answer]) => {
            const item = document.createElement("div");
            item.append(createText("strong", "", question), createText("p", "", answer));
            faq.append(item);
          });

          const acceptForm = document.createElement("form");
          acceptForm.className = "quote-accept-form";
          const nameLabel = document.createElement("label");
          nameLabel.textContent = "Naam voor akkoord";
          const nameInput = document.createElement("input");
          nameInput.type = "text";
          nameInput.required = true;
          nameInput.value = quote.acceptedByName || quote.customerName || "";
          nameLabel.append(nameInput);
          const emailLabel = document.createElement("label");
          emailLabel.textContent = "E-mailadres";
          const emailInput = document.createElement("input");
          emailInput.type = "email";
          emailInput.required = true;
          emailInput.value = quote.acceptedByEmail || quote.customerEmail || "";
          emailLabel.append(emailInput);
          const consentLabel = document.createElement("label");
          consentLabel.className = "quote-consent";
          const consent = document.createElement("input");
          consent.type = "checkbox";
          consent.required = true;
          consentLabel.append(consent, document.createTextNode(" Ik ga akkoord met deze offerte en begrijp dat Max Webstudio daarna contact opneemt over de vervolgstap."));
          const accept = document.createElement("button");
          accept.className = "button primary";
          accept.type = "submit";
          accept.textContent = quote.status === "geaccepteerd" ? "Offerte geaccepteerd" : "Akkoord geven";
          accept.disabled = quote.status === "geaccepteerd";
          const feedback = createText("p", "admin-form-message", "");
          acceptForm.append(nameLabel, emailLabel, consentLabel, accept, feedback);
          acceptForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const acceptedAt = new Date().toISOString();
            const acceptedQuote = updateStoredQuote(quote, {
              status: "geaccepteerd",
              acceptedAt,
              acceptedByName: nameInput.value.trim(),
              acceptedByEmail: emailInput.value.trim(),
              acceptanceMethod: "public_quote_page",
            });
            logDemoEmail(acceptedQuote);
            renderQuote();
          });

          const note = document.createElement("p");
          note.className = `admin-form-message ${quote.status === "geaccepteerd" ? "success" : ""}`;
          note.textContent = quote.status === "geaccepteerd"
            ? `Akkoord ontvangen op ${formatDate(quote.acceptedAt || quote.updatedAt)}. Max Webstudio neemt contact op over de start.`
            : "Akkoord geven is nog geen online betaling. Je bevestigt hiermee dat Max Webstudio het project mag voorbereiden.";

          card.append(kicker, heading, proposal, meta, createText("h3", "", "Wat is inbegrepen?"), included, lines, total, createText("h3", "", "Veelgestelde vragen"), faq, acceptForm, note, createCompanyContactActions(`Vraag over ${quote.quoteNumber || "offerte"}`));
        }

        renderQuote();
      })();
    </script>
  </body>
</html>
