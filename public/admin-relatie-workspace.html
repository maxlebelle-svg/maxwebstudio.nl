<!doctype html>
<html lang="nl" data-admin-access="checking">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Relatiewerkruimte | Max Webstudio</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="src/admin-route-guard.js?v=20260710-p0-validation"></script>
    <style>
      .workspace-page{max-width:1440px;margin:0 auto;padding:24px}.workspace-hero{display:grid;grid-template-columns:1fr auto;gap:20px;padding:24px;border-radius:22px;background:linear-gradient(135deg,#11182b,#1d3158);color:#fff}.workspace-hero p{color:#c8d3ea}.workspace-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.workspace-actions a,.workspace-actions button{min-height:42px;padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.25);background:transparent;color:#fff;text-decoration:none}.workspace-actions .primary{background:#fff;color:#15213b}.workspace-layout{display:grid;grid-template-columns:260px minmax(0,1fr);gap:20px;margin-top:20px}.workspace-nav{position:sticky;top:18px;align-self:start;display:grid;gap:6px;padding:12px;border:1px solid #dce3ef;border-radius:18px;background:#fff}.workspace-nav a{padding:10px 12px;border-radius:10px;color:#273552;text-decoration:none}.workspace-nav a:hover,.workspace-nav a:focus-visible,.workspace-nav a.is-active{background:#eaf1ff;color:#0c4a9c;outline:none}.workspace-panel{min-width:0}.workspace-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.workspace-card{padding:18px;border:1px solid #dce3ef;border-radius:18px;background:#fff;box-shadow:0 8px 26px rgba(15,23,42,.06)}.workspace-card span{color:#64748b;font-size:12px}.workspace-card strong{display:block;margin-top:6px;font-size:24px}.workspace-module-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:16px}.workspace-empty{padding:28px;border:1px dashed #a9b7cc;border-radius:18px;text-align:center}.workspace-status{min-height:24px;margin:14px 0;color:#475569}.workspace-status.is-error{color:#b42318}@media(max-width:900px){.workspace-layout{grid-template-columns:1fr}.workspace-nav{position:static;display:flex;overflow-x:auto}.workspace-nav a{white-space:nowrap}.workspace-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:600px){.workspace-page{padding:12px}.workspace-hero{grid-template-columns:1fr;padding:18px}.workspace-grid,.workspace-module-list{grid-template-columns:1fr}.workspace-actions>*{flex:1;text-align:center}}
    </style>
  </head>
  <body data-admin-sidebar-exception="standalone">
    <main class="workspace-page">
      <section class="workspace-hero" aria-labelledby="workspace-title">
        <div><small>Actieve werkruimte</small><h1 id="workspace-title">Relatie laden…</h1><p id="workspace-meta">De centrale dossiergegevens worden veilig gecontroleerd.</p></div>
        <div class="workspace-actions"><button type="button" id="workspace-switch">Wisselen</button><a id="workspace-dossier" class="primary" href="admin-klanten.html">Open volledig dossier</a><a href="admin-klanten.html">Alle relaties</a></div>
      </section>
      <p class="workspace-status" id="workspace-status" role="status" aria-live="polite"></p>
      <div class="workspace-layout">
        <nav class="workspace-nav" id="workspace-nav" aria-label="Werkruimtemodules"></nav>
        <section class="workspace-panel" id="workspace-panel" aria-live="polite"></section>
      </div>
    </main>
    <script src="admin/ui/global-command-palette.js?v=20260712-workspace-shell" defer></script>
    <script src="admin/ui/relationship-workspace.js?v=20260712-workspace-shell" defer></script>
  </body>
</html>
